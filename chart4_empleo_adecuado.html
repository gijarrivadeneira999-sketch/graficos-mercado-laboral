<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empleo Adecuado y No Adecuado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #f9f8f6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 21px; color: #1a1a2e; margin-bottom: 24px; text-align: center; }
  .charts-row { display: flex; gap: 32px; width: 100%; max-width: 1060px; flex-wrap: wrap; justify-content: center; }
  .chart-card { background: #fff; border-radius: 16px; padding: 28px 48px 20px 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); flex: 1; min-width: 320px; max-width: 480px; }
  .period-label { font-size: 11px; color: #999; margin-bottom: 2px; }
  .chart-title { font-size: 17px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .chart-subtitle { font-size: 11px; color: #aaa; margin-bottom: 20px; }
  .chart-container { position: relative; height: 240px; }
  .source { margin-top: 12px; font-size: 10.5px; color: #aaa; }
</style>
</head>
<body>
<div class="charts-row">
  <div class="chart-card">
    <div class="period-label">Mar. 2021 – Mar. 2026</div>
    <div class="chart-title">Empleo adecuado</div>
    <div class="chart-subtitle">Porcentaje de la PEA | Dato de marzo</div>
    <div class="chart-container"><canvas id="adecChart"></canvas></div>
    <div class="source">Fuente: INEC – ENEMDU</div>
  </div>
  <div class="chart-card">
    <div class="period-label">Mar. 2021 – Mar. 2026</div>
    <div class="chart-title">Empleo no adecuado</div>
    <div class="chart-subtitle">Porcentaje de la PEA | Dato de marzo</div>
    <div class="chart-container"><canvas id="noadecChart"></canvas></div>
    <div class="source">Fuente: INEC – ENEMDU</div>
  </div>
</div>
<script>
const labels = ['Mar 2021','Mar 2022','Mar 2023','Mar 2024','Mar 2025','Mar 2026'];
const adec   = [31.6, 32.7, 34.6, 34.4, 34.2, 32.1];
// No adecuado = subempleo + otro no pleno + no remunerado
const noadec = [
  23.0+27.2+12.6,  // mar-21 = 62.8
  23.0+28.5+10.6,  // mar-22 = 62.1
  19.7+30.9+11.0,  // mar-23 = 61.6
  20.3+30.1+11.3,  // mar-24 = 61.7
  20.9+29.7+11.8,  // mar-25 = 62.4
  19.6+34.8+10.4   // mar-26 = 64.8
].map(v => Math.round(v*10)/10);

function makeChart(id, data, color) {
  const canvas = document.getElementById(id);
  const grad = canvas.getContext('2d').createLinearGradient(0,0,0,240);
  grad.addColorStop(0, color+'28'); grad.addColorStop(1, color+'04');
  new Chart(canvas, {
    type: 'line',
    data: { labels, datasets: [{ data, borderColor: color, backgroundColor: grad, borderWidth: 2.5, pointBackgroundColor: color, pointRadius: 5, pointHoverRadius: 7, fill: true, tension: 0.3 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ' '+c.parsed.y.toFixed(1)+'%' } } },
      scales: {
        x: { ticks: { font:{size:11}, color:'#888' }, grid: { display:false }, border: { display:false } },
        y: { min: 0, max: 100, ticks: { callback: v => v+'%', font:{size:11}, color:'#888', stepSize:20 }, grid: { color:'#f0f0f0' }, border: { display:false } }
      }
    },
    plugins: [{ id:'endLbl', afterDatasetsDraw(chart) {
      const {ctx}=chart; const meta=chart.getDatasetMeta(0);
      const last=meta.data[meta.data.length-1]; const val=data[data.length-1];
      ctx.save(); ctx.fillStyle=color; ctx.font='bold 12px DM Sans,sans-serif';
      ctx.textAlign='left'; ctx.fillText(val.toFixed(1)+'%', last.x+6, last.y+4); ctx.restore();
    }}]
  });
}
makeChart('adecChart',   adec,   '#2563eb');
makeChart('noadecChart', noadec, '#b5861e');
</script>
</body>
</html>
