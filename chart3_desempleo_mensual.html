<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desempleo Mensual</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #f9f8f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 24px; }
  .chart-card { background: #fff; border-radius: 16px; padding: 28px 32px 20px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); width: 100%; max-width: 820px; }
  .period-label { font-size: 11px; color: #999; margin-bottom: 2px; }
  .chart-title { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .chart-subtitle { font-size: 11.5px; color: #999; margin-bottom: 24px; }
  .chart-container { position: relative; height: 280px; }
  .source { margin-top: 14px; font-size: 10.5px; color: #aaa; }
</style>
</head>
<body>
<div class="chart-card">
  <div class="period-label">Ene. 2025 – Mar. 2026</div>
  <div class="chart-title">Porcentaje de la PEA en situación de desempleo</div>
  <div class="chart-subtitle">Serie mensual</div>
  <div class="chart-container"><canvas id="monthlyChart"></canvas></div>
  <div class="source">Fuente: Instituto Nacional de Estadística y Censos (INEC) – ENEMDU</div>
</div>
<script>
const labels = ['Ene-25','Feb-25','Mar-25','Abr-25','May-25','Jun-25','Jul-25','Ago-25','Sep-25','Oct-25','Nov-25','Dic-25','Ene-26','Feb-26','Mar-26'];
const values = [3.8, 3.5, 3.3, 3.6, 4.1, 3.5, 3.3, 3.6, 3.2, 3.2, 3.3, 2.6, 3.4, 3.1, 2.9];

const ctx = document.getElementById('monthlyChart').getContext('2d');
const grad = ctx.createLinearGradient(0,0,0,280);
grad.addColorStop(0,'rgba(108,92,231,0.18)'); grad.addColorStop(1,'rgba(108,92,231,0.01)');

new Chart(ctx, {
  type: 'line',
  data: { labels, datasets: [{ data: values, borderColor:'#6c5ce7', backgroundColor: grad, borderWidth: 2.5, pointBackgroundColor:'#6c5ce7', pointRadius: 4.5, pointHoverRadius: 7, fill: true, tension: 0.4 }] },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ' '+c.parsed.y.toFixed(1)+'%' } } },
    scales: {
      x: { ticks: { font:{size:11}, color:'#888', maxRotation:30 }, grid: { display:false }, border: { display:false } },
      y: { min: 0, max: 8, ticks: { callback: v => v.toFixed(0)+'%', font:{size:11}, color:'#888', stepSize:2 }, grid: { color:'#f0f0f0' }, border: { display:false } }
    }
  },
  plugins: [{ id:'lbl', afterDatasetsDraw(chart) {
    const {ctx,data}=chart;
    data.datasets[0].data.forEach((val,i) => {
      const meta=chart.getDatasetMeta(0); const pt=meta.data[i];
      ctx.save(); ctx.fillStyle='#5a4fcf'; ctx.font='bold 10px DM Sans,sans-serif';
      ctx.textAlign='center'; ctx.fillText(val.toFixed(1)+'%',pt.x,pt.y-10); ctx.restore();
    });
  }}]
});
</script>
</body>
</html>
