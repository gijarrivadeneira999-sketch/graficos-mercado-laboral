<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desempleo en Ecuador</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #f9f8f6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; }
  .charts-row { display: flex; gap: 32px; width: 100%; max-width: 920px; flex-wrap: wrap; justify-content: center; }
  .chart-card { background: #fff; border-radius: 16px; padding: 28px 28px 20px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); flex: 1; min-width: 280px; max-width: 420px; }
  .period-label { font-size: 11px; color: #999; margin-bottom: 2px; }
  .chart-title { font-size: 17px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .chart-subtitle { font-size: 11.5px; color: #999; margin-bottom: 20px; }
  .chart-container { position: relative; height: 240px; }
  .source { margin-top: 12px; font-size: 10.5px; color: #aaa; text-align: right; }
</style>
</head>
<body>
<div class="charts-row">
  <div class="chart-card">
    <div class="period-label">Mar. 2021 – Mar. 2026</div>
    <div class="chart-title">Porcentaje de la PEA en desempleo</div>
    <div class="chart-subtitle">Dato de marzo de cada año</div>
    <div class="chart-container"><canvas id="pctChart"></canvas></div>
    <div class="source">Fuente: INEC – ENEMDU</div>
  </div>
  <div class="chart-card">
    <div class="period-label">Mar. 2021 – Mar. 2026</div>
    <div class="chart-title">Número de personas en desempleo</div>
    <div class="chart-subtitle">Dato de marzo de cada año</div>
    <div class="chart-container"><canvas id="numChart"></canvas></div>
    <div class="source">Fuente: INEC – ENEMDU</div>
  </div>
</div>
<script>
const years = ['Mar 2021','Mar 2022','Mar 2023','Mar 2024','Mar 2025','Mar 2026'];
const pct   = [4.9, 4.8, 3.6, 3.8, 3.3, 2.9];
const num   = [392631, 397645, 302665, 320863, 289156, 252020];

function lineChart(id, data, color, yMax, tickFn, tipFn) {
  const canvas = document.getElementById(id);
  const grad = canvas.getContext('2d').createLinearGradient(0,0,0,240);
  grad.addColorStop(0, color+'28'); grad.addColorStop(1, color+'04');
  new Chart(canvas, {
    type: 'line',
    data: { labels: years, datasets: [{ data, borderColor: color, backgroundColor: grad, borderWidth: 2.5, pointBackgroundColor: color, pointRadius: 5, pointHoverRadius: 7, fill: true, tension: 0.3 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => tipFn(c.parsed.y) } } },
      scales: {
        x: { ticks: { font:{size:11}, color:'#888' }, grid: { display:false }, border: { display:false } },
        y: { min: 0, max: yMax, ticks: { callback: tickFn, font:{size:11}, color:'#888' }, grid: { color:'#f0f0f0' }, border: { display:false } }
      }
    },
    plugins: [{ id:'endLbl', afterDatasetsDraw(chart) {
      const {ctx}=chart; const meta=chart.getDatasetMeta(0);
      const last=meta.data[meta.data.length-1]; const val=data[data.length-1];
      ctx.save(); ctx.fillStyle=color; ctx.font='bold 12px DM Sans,sans-serif';
      ctx.textAlign='left'; ctx.fillText(tipFn(val).trim(), last.x+6, last.y+4); ctx.restore();
    }}]
  });
}
lineChart('pctChart', pct, '#E07B39', 8, v => v.toFixed(1)+'%', v => ' '+v.toFixed(1)+'%');
lineChart('numChart', num, '#e74c3c', 520000, v => (v/1000).toFixed(0)+'K', v => ' '+Math.round(v).toLocaleString('es-EC'));
</script>
</body>
</html>
